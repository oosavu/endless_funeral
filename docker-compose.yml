services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: endless_funeral
      POSTGRES_PASSWORD: endless_funeral
      POSTGRES_DB: endless_funeral
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  graveyard:
    build:
      context: .
      dockerfile: services/graveyard/Dockerfile
    environment:
      DATABASE_URL: postgres://endless_funeral:endless_funeral@postgres:5432/endless_funeral
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
